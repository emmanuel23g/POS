<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema POS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- LOGIN -->
    <div id="login-screen" class="screen-login active">
        <div class="login-container">
            <div class="login-avatar">
                <svg viewBox="0 0 100 100" class="user-icon">
                    <circle cx="50" cy="35" r="20" fill="#888"/>
                    <ellipse cx="50" cy="85" rx="35" ry="25" fill="#888"/>
                </svg>
            </div>
            <div class="login-form">
                <input type="text" id="login-username" placeholder="Usuario (admin/worker)">
                <input type="password" id="login-password" placeholder="Contraseña (1234)">
                <div id="login-error" class="login-error">Credenciales incorrectas</div>
                <button onclick="login()" class="btn-login">Iniciar sesion</button>
                <div class="test-creds">
                    <div class="test-title">Credenciales de prueba:</div>
                    <div class="test-row"><span>Admin:</span><span class="test-highlight">admin / 1234</span></div>
                    <div class="test-row"><span>Worker:</span><span class="test-highlight">worker / 1234</span></div>
                </div>
            </div>
        </div>
        <div class="login-settings">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <circle cx="12" cy="12" r="3" fill="none" stroke="white" stroke-width="2"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="white" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <!-- APP -->
    <div id="app-container" style="display: none;">
        
        <!-- HOME -->
        <div id="home-screen" class="app-screen active">
            <header class="app-header">
                <div class="header-left" onclick="showProfile()">
                    <div class="avatar-small">
                        <svg viewBox="0 0 40 40">
                            <circle cx="20" cy="15" r="8" fill="#888"/>
                            <ellipse cx="20" cy="32" rx="12" ry="8" fill="#888"/>
                        </svg>
                    </div>
                    <span class="header-title" id="header-username">ADMINISTRADOR</span>
                </div>
                <div class="header-right">
                    <button class="btn-calendar" onclick="showReports()" id="btn-calendar-header" style="display: none;">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <rect x="2" y="4" width="20" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="2"/>
                            <line x1="6" y1="2" x2="6" y2="6" stroke="currentColor" stroke-width="2"/>
                            <line x1="18" y1="2" x2="18" y2="6" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </header>
            <main class="main-content">
                <div class="section-label">SELECCIONAR CATEGORIA</div>
                <div class="products-grid" id="products-grid"></div>
            </main>
            <nav class="bottom-nav">
                <button class="nav-icon" onclick="showSellFlow()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <circle cx="9" cy="21" r="2" fill="currentColor"/>
                        <circle cx="20" cy="21" r="2" fill="currentColor"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button class="nav-plus" onclick="showAddProduct()">
                    <svg viewBox="0 0 24 24" width="28" height="28">
                        <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="3"/>
                        <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="3"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="showDailySales()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </nav>
        </div>

        <!-- SELL -->
        <div id="sell-screen" class="app-screen">
            <header class="app-header">
                <div class="header-left" onclick="showProfile()">
                    <div class="avatar-small">
                        <svg viewBox="0 0 40 40">
                            <circle cx="20" cy="15" r="8" fill="#888"/>
                            <ellipse cx="20" cy="32" rx="12" ry="8" fill="#888"/>
                        </svg>
                    </div>
                    <span class="header-title">REGISTRO VENTA</span>
                </div>
                <div class="header-right">
                    <button class="btn-calendar" onclick="showReports()" id="btn-calendar-sell" style="display: none;">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <rect x="2" y="4" width="20" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </header>
            <main class="main-content" id="sell-content"></main>
            <nav class="bottom-nav">
                <button class="nav-icon" onclick="showHome()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button class="nav-plus" onclick="showAddProduct()">
                    <svg viewBox="0 0 24 24" width="28" height="28">
                        <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="3"/>
                        <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="3"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="showDailySales()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </nav>
        </div>

        <!-- ADD PRODUCT -->
        <div id="add-product-screen" class="app-screen gray-bg">
            <header class="app-header compact">
                <div class="header-left" onclick="showProfile()">
                    <div class="avatar-small">
                        <svg viewBox="0 0 40 40">
                            <circle cx="20" cy="15" r="8" fill="#888"/>
                            <ellipse cx="20" cy="32" rx="12" ry="8" fill="#888"/>
                        </svg>
                    </div>
                    <span class="header-title">NUEVA SECCION</span>
                </div>
            </header>
            <main class="main-content center-content">
                <h1 class="page-title">NUEVA SECCION<br>INVENTARIO:</h1>
                <div class="success-msg" id="success-msg">✓ Agregado</div>
                <div class="camera-area" id="camera-area">
                    <video id="camera-video" autoplay playsinline style="display: none;"></video>
                    <img id="captured-image" style="display: none;">
                    <div class="camera-placeholder" id="camera-placeholder">
                        <button onclick="startCamera()" class="btn-camera-icon">
                            <svg viewBox="0 0 24 24" width="40" height="40">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2"/>
                                <circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>
                    </div>
                    <div class="camera-overlay" id="camera-overlay" style="display: none;">
                        <button onclick="captureImage()" class="btn-shutter"></button>
                        <button onclick="stopCamera()" class="btn-cancel-camera">✕</button>
                    </div>
                </div>
                <div class="fallback-upload">
                    <span>o</span>
                    <label class="file-upload-label">
                        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)" style="display: none;">
                        Seleccionar archivo
                    </label>
                </div>
                <div class="form-stacked">
                    <input type="text" id="new-product-name" placeholder="Nombre del producto">
                    <input type="number" id="new-product-stock" placeholder="Cantidad en stock" min="0">
                    <input type="number" id="new-product-price" placeholder="Precio $" min="0" step="0.01">
                </div>
                <button onclick="saveProduct()" class="btn-guardar">GUARDAR</button>
            </main>
            <nav class="bottom-nav single">
                <button class="nav-home" onclick="showHome()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </nav>
        </div>

        <!-- SALES -->
        <div id="sales-screen" class="app-screen">
            <header class="app-header">
                <div class="header-left" onclick="showProfile()">
                    <div class="avatar-small">
                        <svg viewBox="0 0 40 40">
                            <circle cx="20" cy="15" r="8" fill="#888"/>
                            <ellipse cx="20" cy="32" rx="12" ry="8" fill="#888"/>
                        </svg>
                    </div>
                    <span class="header-title">VENTAS DEL DIA</span>
                </div>
                <div class="header-right">
                    <button class="btn-calendar" onclick="showReports()" id="btn-calendar-sales" style="display: none;">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <rect x="2" y="4" width="20" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </header>
            <main class="main-content" id="sales-content"></main>
            <nav class="bottom-nav">
                <button class="nav-icon" onclick="showHome()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button class="nav-plus" onclick="showAddProduct()">
                    <svg viewBox="0 0 24 24" width="28" height="28">
                        <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="3"/>
                        <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="3"/>
                    </svg>
                </button>
                <button class="nav-icon active" onclick="showDailySales()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </nav>
        </div>

        <!-- PROFILE -->
        <div id="profile-screen" class="app-screen gray-bg">
            <header class="app-header compact">
                <div class="header-left">
                    <div class="avatar-small">
                        <svg viewBox="0 0 40 40">
                            <circle cx="20" cy="15" r="8" fill="#888"/>
                            <ellipse cx="20" cy="32" rx="12" ry="8" fill="#888"/>
                        </svg>
                    </div>
                    <span class="header-title" id="profile-header-title">TRABAJADOR EN TURNO</span>
                </div>
            </header>
            <main class="main-content profile-main" id="profile-content"></main>
            <nav class="bottom-nav">
                <button class="nav-icon" onclick="showHome()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button class="nav-plus" onclick="showAddProduct()">
                    <svg viewBox="0 0 24 24" width="28" height="28">
                        <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="3"/>
                        <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="3"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="showDailySales()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </nav>
        </div>

        <!-- REPORTS -->
        <div id="reports-screen" class="app-screen">
            <header class="app-header">
                <div class="header-left" onclick="showProfile()">
                    <div class="avatar-small">
                        <svg viewBox="0 0 40 40">
                            <circle cx="20" cy="15" r="8" fill="#888"/>
                            <ellipse cx="20" cy="32" rx="12" ry="8" fill="#888"/>
                        </svg>
                    </div>
                    <span class="header-title" id="reports-title">REGISTRO MENSUAL</span>
                </div>
            </header>
            <main class="main-content" id="reports-content"></main>
            <div class="report-tabs">
                <button onclick="switchReportView('monthly')" class="tab-btn active" id="tab-monthly">MENSUAL</button>
                <button onclick="switchReportView('weekly')" class="tab-btn" id="tab-weekly">SEMANAL</button>
            </div>
            <nav class="bottom-nav">
                <button class="nav-icon" onclick="showHome()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
                        <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button class="nav-plus" onclick="showAddProduct()">
                    <svg viewBox="0 0 24 24" width="28" height="28">
                        <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="3"/>
                        <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="3"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="showDailySales()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </nav>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
